openapi: 3.0.3
info:
  title: Point of Service (POS) API
  version: '1.0'
  description: |
    > **Caution:** This is a sample API reference, not a live API. Requests made
    using **Test Request** fail with a network error.

    This API manages a point-of-service system, including orders, dishes,
    ingredients, users, and authentication. It supports full CRUD operations.
    Patrons place orders through it. Staff and backend systems manage the rest.

    ## How to use this sample

    1. In the **Authentication** panel, select from **Auth Type**.
    2. Browse the endpoints in the left sidebar.
    3. Open an endpoint to read its description and parameters.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://api.pointofservice.example/v1
    description: Sample production server (illustrative only — not a live endpoint).
tags:
  - name: Orders
    description: Manage customer orders, including creation, updates, and tracking.
  - name: Dishes
    description: Manage dishes available for ordering, including their ingredients and categories.
  - name: Ingredients
    description: Track and manage ingredient inventory and usage in dishes.
  - name: Users
    description: Manage user accounts and roles for the application.
  - name: Auth
    description: Handle authentication, including token generation and refresh.
paths:
  /orders:
    post:
      summary: Create an order
      operationId: postOrder
      description: Create an order with dish selections and customer details
      tags:
        - Orders
      security:
        - AccessToken: []
      responses:
        '201':
          description: Resource created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          headers:
            Location:
              schema:
                type: string
              description: The URL of the newly created order.
        '400':
          description: Bad request. The request was invalid.
        '401':
          description: Unauthorized. Authentication is required, or credentials are invalid.
        '403':
          description: Forbidden. The server refuses to authorize the request.
        '404':
          description: Not found. The requested resource does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Conflict. The request conflicts with the current state of the resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          description: Internal server error. An unexpected error occurred on the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
      requestBody:
        $ref: '#/components/requestBodies/CreateOrderRequest'
    get:
      summary: Get a list of orders
      description: |
        Get a list of orders with optional filtering and sorting.
        Use the `limit` and `offset` query parameters to paginate the response.
      operationId: getOrderList
      tags:
        - Orders
      parameters:
        - name: sort
          in: query
          description: Field name to sort the results by.
          schema:
            type: string
          example: priority
        - name: order
          in: query
          description: Sort direction, either ascending (`asc`) or descending (`desc`).
          schema:
            type: string
          example: asc
        - name: fields
          in: query
          description: Pipe-separated list of fields to include in the response, e.g. `name|price`.
          schema:
            type: string
          example: table_number|status|priority
        - name: filter
          in: query
          description: Filter results using `field.operator~value` syntax, separated by `|` for multiple conditions.
          schema:
            type: string
            example: table_number.lt~5|status.eq~On the Way
        - name: limit
          in: query
          description: Maximum number of results to return per page.
          schema:
            type: integer
            maximum: 30
          example: 10
        - name: offset
          in: query
          description: Number of results to skip before starting to return results, used for pagination.
          schema:
            type: integer
            example: 0
      responses:
        '200':
          description: The request was successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  total_results:
                    type: integer
                    example: 20
        '400':
          description: Bad request. The request was invalid.
        '401':
          description: Unauthorized. Authentication is required, or credentials are invalid.
        '403':
          description: Forbidden. The server refuses to authorize the request.
        '500':
          description: Internal server error. An unexpected error occurred on the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
