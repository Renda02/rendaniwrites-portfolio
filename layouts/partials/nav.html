<header class="site-header">
  <div class="site-header__inner">
    <a href="{{ "/" | relURL }}" class="site-header__brand{{ if .IsHome }} is-active{{ end }}">{{ site.Params.firstName | default "Rendani" }}</a>
    <button type="button" class="site-header__toggle" aria-expanded="false" aria-controls="primary-nav" aria-label="Toggle navigation menu">
      <span class="site-header__toggle-bar"></span>
      <span class="site-header__toggle-bar"></span>
      <span class="site-header__toggle-bar"></span>
    </button>
    <nav id="primary-nav" class="site-header__nav" aria-label="Main navigation">
      {{ range site.Menus.main }}
        <a href="{{ .URL | relURL }}" class="site-header__link{{ if $.IsMenuCurrent "main" . }} is-active{{ end }}">{{ .Name }}</a>
      {{ end }}
      <button type="button" class="theme-toggle" aria-label="Switch to dark mode">
        <svg class="theme-toggle__icon theme-toggle__icon--light" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="theme-toggle__icon theme-toggle__icon--dark" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5Z"/></svg>
      </button>
    </nav>
  </div>
</header>

{{ with resources.Get "js/nav.js" }}
  {{ $js := . | minify | fingerprint }}
  <script src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}" defer></script>
{{ end }}
