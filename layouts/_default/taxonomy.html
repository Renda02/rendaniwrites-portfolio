{{ define "main" }}
<div class="container">
  <h1>{{ .Title }}</h1>
  {{ .Content }}

  {{ if .Data.Terms }}
  <ul class="tag-list">
    {{ range .Data.Terms.Alphabetical }}
    <li class="tag-list__item">
      <a href="{{ .Page.RelPermalink }}" class="tag-list__link">{{ replace .Name "-" " " | strings.FirstUpper }}</a>
      <span class="tag-list__count">{{ .Count }}</span>
    </li>
    {{ end }}
  </ul>
  {{ end }}
</div>
{{ end }}
